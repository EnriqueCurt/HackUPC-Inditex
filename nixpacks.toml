[variables]
PYTHONUNBUFFERED = "1"
STREAMLIT_BROWSER_GATHER_USAGE_STATS = "false"

[phases.setup]
aptPkgs = ["build-essential", "g++"]

[phases.install]
cmds = ["pip install --no-cache-dir -r requirements.txt"]

[phases.build]
cmds = ["g++ cpp/main.cpp cpp/dualCycleShuttle.cpp cpp/paletManager.cpp cpp/silo.cpp -O2 -o simulador"]

[start]
cmd = "streamlit run frontend/app_streamlit.py --server.address 0.0.0.0 --server.port $PORT"
